<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cloud Web App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; }
        .container { margin-top: 100px; padding: 20px; background: white; display: inline-block; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 250px; }
        button { padding: 10px 20px; background-color: #2ea44f; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #2c974b; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cloud Note Taker</h1>
        <p>Status: <span id="status">Ready</span></p>
        <input type="text" id="noteInput" placeholder="Write something...">
        <button onclick="sendData()">Save to Cloud</button>
    </div>

    <script>
        async function sendData() {
    const input = document.getElementById('noteInput').value;
    const status = document.getElementById('status');
    
    if(!input) {
        alert("Please type something first!");
        return;
    }

    status.innerText = "🚀 Sending to Cloud...";
    status.style.color = "blue";

    try {
        const response = await fetch('https://cc-miniproject-lcfy.onrender.com/add-note', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ content: input })
        });

        if (response.ok) {
            status.innerText = "✅ Successfully saved to MongoDB!";
            status.style.color = "green";
            document.getElementById('noteInput').value = ""; // Clear the box
        } else {
            status.innerText = "❌ Server error. Check Render logs.";
            status.style.color = "red";
        }
    } catch (error) {
        console.error("Error:", error);
        status.innerText = "⚠️ Connection Failed! (Check MongoDB IP Whitelist)";
        status.style.color = "red";
    }
}
</body>
</html>
